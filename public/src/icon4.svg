<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#FFF8E1" stroke="#333" stroke-width="8"/>

  <!-- Center node -->
  <circle cx="256" cy="230" r="52" fill="#FF7043" stroke="#333" stroke-width="6"/>
  <!-- Pen icon in center -->
  <g transform="translate(256,230)">
    <rect x="-10" y="-26" width="20" height="38" rx="4" fill="white" stroke="#333" stroke-width="4"/>
    <polygon points="0,-26 -10,-26 -10,-18 10,-18 10,-26" fill="#FFD600" stroke="#333" stroke-width="3"/>
    <polygon points="-10,12 10,12 0,26" fill="#FFF176" stroke="#333" stroke-width="3"/>
  </g>

  <!-- Branch lines -->
  <!-- Top-left -->
  <line x1="210" y1="195" x2="130" y2="130" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <!-- Top-right -->
  <line x1="302" y1="195" x2="380" y2="130" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <!-- Left -->
  <line x1="204" y1="230" x2="110" y2="230" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <!-- Right -->
  <line x1="308" y1="230" x2="400" y2="230" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <!-- Bottom-left -->
  <line x1="220" y1="272" x2="150" y2="340" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <!-- Bottom-right -->
  <line x1="292" y1="272" x2="362" y2="340" stroke="#333" stroke-width="5" stroke-linecap="round"/>

  <!-- Top-left node -->
  <circle cx="118" cy="118" r="34" fill="#42A5F5" stroke="#333" stroke-width="5"/>
  <text x="118" y="125" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Arial">A</text>

  <!-- Top-right node -->
  <circle cx="392" cy="118" r="34" fill="#66BB6A" stroke="#333" stroke-width="5"/>
  <text x="392" y="125" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Arial">B</text>

  <!-- Left node -->
  <circle cx="90" cy="230" r="34" fill="#AB47BC" stroke="#333" stroke-width="5"/>
  <text x="90" y="237" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Arial">C</text>

  <!-- Right node -->
  <circle cx="418" cy="230" r="34" fill="#FF7043" stroke="#333" stroke-width="5"/>
  <text x="418" y="237" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Arial">D</text>

  <!-- Bottom-left node -->
  <circle cx="136" cy="356" r="34" fill="#26C6DA" stroke="#333" stroke-width="5"/>
  <text x="136" y="363" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Arial">E</text>

  <!-- Bottom-right node -->
  <circle cx="376" cy="356" r="34" fill="#FFA726" stroke="#333" stroke-width="5"/>
  <text x="376" y="363" text-anchor="middle" font-size="22" font-weight="bold" fill="white" font-family="Arial">F</text>

  <!-- AI sparkle stars -->
  <g fill="#FFD600" stroke="#333" stroke-width="2">
    <!-- Star 1 -->
    <polygon points="256,420 261,434 276,434 264,443 269,457 256,448 243,457 248,443 236,434 251,434" />
  </g>
  <!-- Small sparkles -->
  <circle cx="195" cy="390" r="6" fill="#FFD600" stroke="#333" stroke-width="2"/>
  <circle cx="318" cy="390" r="6" fill="#FFD600" stroke="#333" stroke-width="2"/>
  <circle cx="256" cy="480" r="5" fill="#FFD600" stroke="#333" stroke-width="2"/>
</svg>
